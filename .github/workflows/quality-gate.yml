name: Frontend Quality Gate

# Запускати перевірки при кожному Pull Request у гілку main
on:
  pull_request:
    branches: [ main ]

jobs:
  quality-checks:
    name: Lint, Format, and Test
    runs-on: ubuntu-latest

    steps:
      # 1. Клонування репозиторію на сервер GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Встановлення Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Встановлення залежностей
      - name: Install Dependencies
        run: npm ci

      # 4. Перевірка форматування (Prettier)
      - name: Check Code Formatting
        run: npm run format:check

      # 5. Перевірка логічних помилок (ESLint)
      - name: Run Linter
        run: npm run lint

      # 6. Запуск юніт-тестів (Vitest)
      - name: Run Unit Tests
        run: npm run test:ci